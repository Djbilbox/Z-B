<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZUBAIR BILEL | Paris - London</title>
  <meta name="description" content="Le meilleur de la France et de l'Angleterre, livré chez vous. Montres, maroquinerie, meubles et décoration de luxe.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --c-black: #0A0A0A;
      --c-black-light: #1A1A1A;
      --c-gold: #C9A84C;
      --c-gold-hover: #DFC272;
      --c-white: #F5F0E8;
      --c-bordeaux: #6B1A2A;
      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Montserrat', sans-serif;
      --radius-sm: 4px;
      --radius-md: 8px;
      --nav-height: 80px;
      --transition-slow: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --transition-fast: 0.2s ease;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: var(--c-black); color: var(--c-white); font-family: var(--font-body); line-height: 1.6; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
    h1,h2,h3,h4,h5,h6 { font-family: var(--font-display); font-weight: 500; }
    a { color: inherit; text-decoration: none; transition: color var(--transition-fast); }
    ul { list-style: none; }
    button { background: none; border: none; color: inherit; cursor: pointer; font-family: inherit; }
    .container { width: 100%; max-width: 1440px; margin: 0 auto; padding: 0 5%; }
    .btn-gold { background-color: var(--c-gold); color: var(--c-black); padding: 12px 32px; font-family: var(--font-body); font-size: 0.9rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; border-radius: var(--radius-sm); transition: all var(--transition-slow); display: inline-block; border: 1px solid var(--c-gold); }
    .btn-gold:hover { background-color: transparent; color: var(--c-gold); }
    .btn-outline { border: 1px solid var(--c-gold); color: var(--c-gold); padding: 12px 32px; font-family: var(--font-body); font-size: 0.9rem; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; border-radius: var(--radius-sm); transition: all var(--transition-slow); }
    .btn-outline:hover { background-color: var(--c-gold); color: var(--c-black); }
    .section-title { font-size: 3rem; text-align: center; margin-bottom: 3rem; color: var(--c-gold); }
    .fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.8s ease, transform 0.8s ease; }
    .fade-in.visible { opacity: 1; transform: translateY(0); }
    /* NAVBAR */
    .navbar { position: fixed; top: 0; width: 100%; height: var(--nav-height); display: flex; align-items: center; justify-content: space-between; padding: 0 5%; background: rgba(10,10,10,0.85); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid rgba(201,168,76,0.1); transition: all var(--transition-slow); }
    .navbar.scrolled { height: 70px; background: rgba(10,10,10,0.95); border-bottom: 1px solid rgba(201,168,76,0.3); }
    .logo { font-family: var(--font-display); font-size: 2rem; font-weight: 700; color: var(--c-gold); letter-spacing: 2px; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-link { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; position: relative; padding: 5px 0; }
    .nav-link::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background-color: var(--c-gold); transition: width var(--transition-slow); }
    .nav-link:hover::after { width: 100%; }
    .nav-icons { display: flex; align-items: center; gap: 1.5rem; }
    .icon-btn { position: relative; color: var(--c-white); transition: color var(--transition-fast); }
    .icon-btn:hover { color: var(--c-gold); }
    .cart-badge { position: absolute; top: -8px; right: -8px; background-color: var(--c-bordeaux); color: var(--c-white); font-size: 0.65rem; font-weight: 600; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275); }
    .cart-badge.bounce { transform: scale(1.3); }
    .lang-dropdown { position: relative; display: inline-block; }
    .lang-switch { display: flex; align-items: center; gap: 5px; font-family: var(--font-display); font-weight: 600; font-size: 1rem; cursor: pointer; background: none; border: none; color: var(--c-white); transition: color var(--transition-fast); }
    .lang-switch:hover { color: var(--c-gold); }
    .lang-menu { position: absolute; top: 100%; right: 0; background: var(--c-black-light); border: 1px solid var(--c-gold); border-radius: var(--radius-sm); padding: 0.5rem 0; list-style: none; display: none; flex-direction: column; min-width: 120px; z-index: 2000; }
    .lang-dropdown:hover .lang-menu { display: flex; }
    .lang-menu li { padding: 0.5rem 1rem; cursor: pointer; font-size: 0.85rem; color: var(--c-white); transition: background var(--transition-fast), color var(--transition-fast); }
    .lang-menu li:hover { background: var(--c-gold); color: var(--c-black); }
    .hamburger { display: none; color: var(--c-white); }
