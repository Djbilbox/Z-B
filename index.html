        // Constants

        // State
        let currentLang = 'fr';
        let cart = [];

        // Dictionaries for dynamic JS elements

            empty_cart: { fr: "Votre panier est vide.", en: "Your cart is empty.", ru: "Ваша корзина пуста.", ur: "آپ کی کارٹ خالی ہے۔", es: "Tu carrito está vacío.", it: "Il tuo carrello è vuoto." },
            remove: { fr: "Retirer", en: "Remove", ru: "Удалить", ur: "ہٹائیں", es: "Eliminar", it: "Rimuovi" },
            order_conf: { fr: "Commande Confirmée", en: "Order Confirmed", ru: "Заказ подтвержден", ur: "آرڈر کی تصدیق ہو گئی", es: "Pedido Confirmado", it: "Ordine Confermato" },
            order_msg: { fr: "Merci pour votre achat chez ZUBAIR & BILEL. Vous recevrez un email de confirmation.", en: "Thank you for your purchase at ZUBAIR & BILEL. You will receive a confirmation email.", ru: "Спасибо за вашу покупку в ZUBAIR & BILEL. Вы получите письмо с подтверждением.", ur: "زبیر اور بلال میں آپ کی خریداری کا شکریہ۔ آپ کو تصدیقی ای میل موصول ہوگی۔", es: "Gracias por su compra en ZUBAIR & BILEL. Recibirá un correo electrónico de confirmación.", it: "Grazie per il tuo acquisto presso ZUBAIR & BILEL. Riceverai un'e-mail di conferma." },
            sub_conf: { fr: "Inscription Réussie", en: "Subscription Successful", ru: "Подписка оформлена", ur: "سبسکرپشن کامیاب", es: "Suscripción Exitosa", it: "Iscrizione Riuscita" },
            sub_msg: { fr: "Bienvenue dans le club ZUBAIR & BILEL.", en: "Welcome to the ZUBAIR & BILEL club.", ru: "Добро пожаловать в клуб ZUBAIR & BILEL.", ur: "زبیر اور بلال کلب میں خوش آمدید۔", es: "Bienvenido al club ZUBAIR & BILEL.", it: "Benvenuto nel club ZUBAIR & BILEL." },
            close: { fr: "Fermer", en: "Close", ru: "Закрыть", ur: "بند کریں", es: "Cerrar", it: "Chiudi" }
        };

        // Products Data
        const products = [
            { id: 1, name: "Louis Vuitton Speedy 30", price: 850, category: "maroquinerie", origin: "🇫🇷", source: "Vinted", country: "france", link: "https://www.vinted.fr/catalog?search_text=louis+vuitton+speedy", img: "https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=500&q=80" },
            { id: 2, name: "Burberry Trench Coat", price: 420, category: "maroquinerie", origin: "🇬🇧", source: "TK Maxx", country: "uk", link: "https://www.tkmaxx.com/uk/en/search?q=burberry+trench", img: "https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=500&q=80" },
            { id: 3, name: "Rolex Submariner", price: 8500, category: "montres", origin: "🇫🇷", source: "Leboncoin", country: "france", link: "https://www.leboncoin.fr/recherche?text=rolex+submariner", img: "https://images.unsplash.com/photo-1522312346375-d1a52e2b99b3?w=500&q=80" },
            { id: 4, name: "Gucci Sunglasses", price: 180, category: "maroquinerie", origin: "🇬🇧", source: "TK Maxx", country: "uk", link: "https://www.tkmaxx.com/uk/en/search?q=gucci+sunglasses", img: "https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=500&q=80" },
            { id: 5, name: "Chanel Timeless", price: 4200, category: "maroquinerie", origin: "🇬🇧", source: "Vinted UK", country: "uk", link: "https://www.vinted.co.uk/catalog?search_text=chanel+timeless", img: "https://images.unsplash.com/photo-1584916201218-f4242ceb4809?w=500&q=80" },
            { id: 6, name: "Carré Hermès Soie", price: 250, category: "maroquinerie", origin: "🇫🇷", source: "Vinted FR", country: "france", link: "https://www.vinted.fr/catalog?search_text=carre+hermes", img: "https://images.unsplash.com/photo-1606760227091-3dd870d97f1d?w=500&q=80" },
            { id: 7, name: "Cartier Tank", price: 2100, category: "montres", origin: "🇬🇧", source: "Vinted UK", country: "uk", link: "https://www.vinted.co.uk/catalog?search_text=cartier+tank", img: "https://images.unsplash.com/photo-1548171915-e76a380ebbf3?w=500&q=80" },
            { id: 8, name: "Vase Baccarat", price: 340, category: "decor", origin: "🇫🇷", source: "Leboncoin", country: "france", link: "https://www.leboncoin.fr/recherche?text=vase+baccarat", img: "https://images.unsplash.com/photo-1610701596007-11502861dcfa?w=500&q=80" },
            { id: 9, name: "Dior Saddle Bag", price: 1950, category: "maroquinerie", origin: "🇫🇷", source: "Vinted FR", country: "france", link: "https://www.vinted.fr/catalog?search_text=dior+saddle", img: "https://images.unsplash.com/photo-1591561954557-26941169b49e?w=500&q=80" },
            { id: 10, name: "Vivienne Westwood", price: 120, category: "maroquinerie", origin: "🇬🇧", source: "Oxfam", country: "uk", link: "https://onlineshop.oxfam.org.uk/search?q=vivienne+westwood", img: "https://images.unsplash.com/photo-1535632066927-ab7c9ab60908?w=500&q=80" },
            { id: 11, name: "Prada Loafers", price: 380, category: "maroquinerie", origin: "🇬🇧", source: "Vinted UK", country: "uk", link: "https://www.vinted.co.uk/catalog?search_text=prada+loafers", img: "https://images.unsplash.com/photo-1608667508764-33cf0726b13a?w=500&q=80" },
            { id: 12, name: "Omega Speedmaster", price: 4500, category: "montres", origin: "🇫🇷", source: "Leboncoin", country: "france", link: "https://www.leboncoin.fr/recherche?text=omega+speedmaster", img: "https://images.unsplash.com/photo-1524592094714-0f0654ece975?w=500&q=80" }
        ];

        // Format Currency
        const formatEur = (amount) => new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(amount);
        const formatGbp = (amount) => new Intl.NumberFormat('en-GB', { style: 'currency', currency: 'GBP' }).format(amount * EXCHANGE_RATE);

        // Render Products
        function renderProducts(filter = 'all') {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            
            const filtered = filter === 'all' 
                ? products 
                : products.filter(p => p.category === filter || p.country === filter);
            
            filtered.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-img-wrapper">
                        <img src="${product.img}" alt="${product.name}" class="product-img" loading="lazy">
                        <span class="product-origin">${product.origin} ${product.source}</span>
                    </div>
                    <div class="product-info">
                        <h4 class="product-name">${product.name}</h4>
                        <div class="product-price">
                            <span>${formatEur(product.price)}</span>
                            <span class="price-gbp">${formatGbp(product.price)}</span>
                        </div>
                        <div style="display: flex; gap: 10px; margin-top: 1rem;">
                            <button class="btn-add" style="flex: 1;" onclick="addToCart(${product.id})">${translations.add_cart[currentLang]}</button>
                            <a href="${product.link}" target="_blank" class="btn-outline" style="padding: 10px 15px; border-radius: var(--radius-sm); border: 1px solid var(--c-gold); color: var(--c-gold); display: flex; align-items: center; justify-content: center; text-decoration: none;" title="Voir sur ${product.source}">
                                <i data-lucide="external-link" size="18"></i>
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            if (typeof lucide !== 'undefined') { lucide.createIcons(); }
        }

        // Filters Setup
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                renderProducts(e.target.dataset.filter);
            });
        });

        // Cart Functions
        function updateCartUI() {
            const count = cart.reduce((acc, item) => acc + item.qty, 0);
            const badge = document.getElementById('cart-count');
            badge.textContent = count;
            
            // Bounce animation
            badge.classList.remove('bounce');
            void badge.offsetWidth; // trigger reflow
            badge.classList.add('bounce');

            const cartItems = document.getElementById('cart-items');
            cartItems.innerHTML = '';

            let total = 0;

            if (cart.length === 0) {
                cartItems.innerHTML = `<p class="empty-cart">${translations.empty_cart[currentLang]}</p>`;
            } else {
                cart.forEach(item => {
                    total += item.price * item.qty;
                    cartItems.innerHTML += `
                        <div class="cart-item">
                            <img src="${item.img}" alt="${item.name}" class="cart-item-img">
                            <div class="cart-item-details">
                                <h5 class="cart-item-title">${item.name}</h5>
                                <div class="cart-item-price">${formatEur(item.price)}</div>
                                <div class="cart-item-actions">
                                    <button class="qty-btn" onclick="updateQty(${item.id}, -1)">-</button>
                                    <span>${item.qty}</span>
                                    <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                                    <button class="remove-item" onclick="removeFromCart(${item.id})">${translations.remove[currentLang]}</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('total-eur').textContent = formatEur(total);
            document.getElementById('total-gbp').textContent = formatGbp(total);
            
            // Update Close modal button
            document.querySelector('#modal .btn-outline').textContent = translations.close[currentLang];
        }

        window.addToCart = (id) => {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            updateCartUI();
            openCart();
        };

        window.updateQty = (id, change) => {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) removeFromCart(id);
                else updateCartUI();
            }
        };

        window.removeFromCart = (id) => {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        };

        // Cart Drawer Toggle
        const cartDrawer = document.getElementById('cart-drawer');
        const cartOverlay = document.getElementById('cart-overlay');
        
        function openCart() {
            cartDrawer.classList.add('active');
            cartOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeCart() {
            cartDrawer.classList.remove('active');
            cartOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('cart-btn').addEventListener('click', openCart);
        document.getElementById('close-cart').addEventListener('click', closeCart);
        cartOverlay.addEventListener('click', closeCart);

        // Language Switcher Logic
        const langDropdownBtn = document.getElementById('lang-switch');
        
        document.querySelectorAll('.lang-menu li').forEach(item => {
            item.addEventListener('click', (e) => {
                const newLang = e.target.dataset.lang;
                setLanguage(newLang);
            });
        });

        function setLanguage(lang) {
            currentLang = lang;
            
            // Update button text
            langDropdownBtn.innerHTML = `${lang.toUpperCase()} <i data-lucide="chevron-down" size="16"></i>`;
            if (typeof lucide !== 'undefined') { lucide.createIcons(); } // re-init icon
